name: www2 Tests

on:
  push:
    branches: [master]
    paths:
      - 'www2/**'
      - '.github/workflows/www2-tests.yml'
  pull_request:
    paths:
      - 'www2/**'
      - '.github/workflows/www2-tests.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: www2

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: www2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci
        env:
          CI: true
