<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>QuranQuiz backdrop</title>
<style>
*{margin:0;box-sizing:border-box} html,body{height:100%}
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif}
.outer{position:fixed;inset:0;display:flex;justify-content:center;overflow:hidden}
.inner{position:relative;z-index:1;flex:1;width:100%;max-width:512px;background:#edf1f5;
  box-shadow:0 0 24px rgba(0,0,0,.18);display:flex;flex-direction:column;align-items:center;gap:18px;padding-top:90px;color:#0d2d4e}
.icon{width:88px;height:88px;border-radius:20px;background:#0d2d4e;display:flex;align-items:center;justify-content:center;color:#f39c12;font-size:34px;font-weight:800}
.t{font-size:22px;font-weight:800}
.card{width:84%;background:#fff;border-radius:14px;padding:18px;box-shadow:0 6px 18px rgba(13,45,78,.08);text-align:center;color:#33485e}

  background-size: 240px 240px, 372px 372px;
  background-position: 0px 0px, 0px 0px;
  background-repeat: repeat, repeat;
  animation: qqnDrift 55s linear infinite;
}
#qqn-web-bg::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(60% 50% at 50% 34%, rgba(255,255,255,0.40), rgba(255,255,255,0) 72%);
  animation: qqnBreathe 9s ease-in-out infinite;
}
@keyframes qqnDrift {
  from { background-position: 0px 0px, 0px 0px; }
  to   { background-position: 240px -240px, -372px 372px; }
}
@keyframes qqnBreathe {
  0%, 100% { opacity: .35; transform: scale(1); }
  50%      { opacity: .8;  transform: scale(1.05); }
}
@media (prefers-reduced-motion: reduce) {
  #qqn-web-bg, #qqn-web-bg::before { animation: none; }
}

<body><div class="outer" id="qqn-web-bg"><div class="inner">
<div class="icon">ق</div><div class="t">اختبار القرآن</div>
<div class="card">معاينة — رمادي أغمق قليلاً وأبيض.</div>
<div class="card">وسّع نافذة المتصفح لرؤية النقش المتحرك.</div>
</div></div></body></html>
